<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reuse · Visor HTML</title>
  <link rel="icon" href="/icon.png">
  <script>(function(){try{var p=localStorage.getItem('hv-theme')||'system';var d=p==='dark'||(p!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();</script>
  <link rel="stylesheet" href="/app.css">
</head>
<body class="center">
  <div class="theme-corner"><span id="theme-mount"></span></div>
  <div class="card auth">
    <img class="brandmark logo-light" src="/logo-purple.png" alt="Reuse">
    <img class="brandmark logo-dark" src="/logo-white.png" alt="Reuse">

    <!-- Paso 1: token -->
    <form id="step-token">
      <p class="muted">Visor de archivos HTML. Ingresa el token de acceso.</p>
      <input type="password" id="token" placeholder="Token de acceso" autocomplete="current-password" required>
      <button type="submit">Continuar</button>
      <p id="err-token" class="error" hidden></p>
    </form>

    <!-- Paso 2: perfil -->
    <form id="step-profile" hidden>
      <p class="muted">¿Con qué perfil entras?</p>
      <select id="profile-select"></select>
      <button type="button" id="new-profile" class="ghost">+ Crear perfil nuevo</button>
      <button type="submit">Entrar</button>
      <p id="err-profile" class="error" hidden></p>
    </form>
  </div>
  <script type="module" src="/theme.js"></script>
  <script type="module" src="/login.js"></script>
</body>
</html>
