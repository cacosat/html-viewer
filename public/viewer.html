<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>html-viewer · Documento</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="viewer-body">
  <header class="topbar">
    <a href="/library" class="ghost">← Biblioteca</a>
    <input id="title" class="title-input" placeholder="Título" title="Editar título">
    <div class="spacer"></div>
    <div class="tabs">
      <button data-tab="view" class="active">Vista</button>
      <button data-tab="text">Editar texto</button>
      <button data-tab="code">Código</button>
    </div>
    <div class="spacer"></div>
    <button id="copy" class="ghost">Copiar link</button>
    <button id="save" disabled>Guardar</button>
  </header>
  <main class="viewer-main">
    <!-- Vista interactiva: scripts del reporte corren, pero en origen opaco (sin allow-same-origin). -->
    <iframe id="viewFrame" sandbox="allow-scripts allow-forms allow-popups allow-modals allow-downloads"></iframe>
    <!-- Edición de texto: allow-same-origin para poder activar designMode; sin allow-scripts, los
         scripts del reporte quedan inertes (no se ejecutan) pero se conservan al guardar. -->
    <iframe id="editFrame" sandbox="allow-same-origin" hidden></iframe>
    <textarea id="code" spellcheck="false" hidden></textarea>
  </main>
  <script type="module" src="/viewer.js"></script>
</body>
</html>
