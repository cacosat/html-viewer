<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reuse · Biblioteca</title>
  <link rel="icon" href="/icon.png">
  <script>(function(){try{var p=localStorage.getItem('hv-theme')||'system';var d=p==='dark'||(p!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();</script>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header class="topbar">
    <a href="/library" class="brand-link" aria-label="Inicio">
      <img class="brandmark logo-light" src="/logo-purple.png" alt="Reuse">
      <img class="brandmark logo-dark" src="/logo-white.png" alt="Reuse">
    </a>
    <span class="sub">Visor</span>
    <div class="spacer"></div>
    <span id="theme-mount"></span>
    <button id="logout" class="ghost">Salir</button>
  </header>

  <main class="container">
    <div id="storage-warn" class="banner" hidden></div>
    <section class="card">
      <h2>Subir HTML</h2>
      <form id="upload" class="upload-form">
        <input type="file" id="file" accept=".html,.htm,text/html" required>
        <input type="text" id="title" placeholder="Título (opcional)">
        <select id="profile"></select>
        <button type="submit">Subir</button>
      </form>
      <details class="profiles">
        <summary>Gestionar perfiles</summary>
        <div class="profiles-body">
          <form id="add-profile" class="row">
            <input type="text" id="profile-name" placeholder="Nuevo perfil (ej: Marketing)">
            <button type="submit" class="ghost">Agregar</button>
          </form>
          <ul id="profile-list"></ul>
        </div>
      </details>
    </section>

    <section>
      <h2>Mis archivos</h2>
      <div id="docs" class="docs"></div>
      <p id="empty" class="muted" hidden>Aún no has subido archivos.</p>
    </section>
  </main>

  <script type="module" src="/theme.js"></script>
  <script type="module" src="/library.js"></script>
</body>
</html>
