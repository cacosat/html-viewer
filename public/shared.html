<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Documento compartido · Reuse</title>
  <link rel="icon" href="/icon.png">
  <script>(function(){try{var p=localStorage.getItem('hv-theme')||'system';var d=p==='dark'||(p!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();</script>
  <link rel="stylesheet" href="/app.css">
</head>
<body class="viewer-body">
  <header class="topbar share">
    <a href="/" class="brand-link" aria-label="Ir al inicio de Reuse">
      <img class="brandmark logo-light" src="/logo-purple.png" alt="Reuse">
      <img class="brandmark logo-dark" src="/logo-white.png" alt="Reuse">
    </a>
    <span id="title" style="font-weight:600">Documento</span>
    <div class="spacer"></div>
    <span id="theme-mount"></span>
    <a id="download" class="ghost">Descargar HTML</a>
  </header>
  <main class="viewer-main">
    <div class="stage">
      <iframe id="frame" sandbox="allow-scripts allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </main>
  <script type="module" src="/theme.js"></script>
  <script type="module" src="/shared.js"></script>
</body>
</html>
